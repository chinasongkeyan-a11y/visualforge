name: Build Docker Image

on:
  # push 到 main/master 分支时自动构建
  push:
    branches: [main, master]
  # 手动触发
  workflow_dispatch:

env:
  IMAGE_NAME: visualforge

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ env.IMAGE_NAME }}:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image to tar.gz
        run: docker save ${{ env.IMAGE_NAME }}:latest | gzip > visualforge.tar.gz

      - name: Get image size
        run: ls -lh visualforge.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: visualforge-docker-image
          path: visualforge.tar.gz
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: docker-${{ github.run_number }}
          name: Docker Image Build #${{ github.run_number }}
          files: visualforge.tar.gz
