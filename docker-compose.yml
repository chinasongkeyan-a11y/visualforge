services:
  visualforge:
    build: .
    container_name: visualforge
    ports:
      - "5000:5000"
    volumes:
      # Persist rendered videos to host
      - ./renders:/app/renders
    environment:
      - NODE_ENV=production
      - PORT=5000
      - RENDERS_DIR=/app/renders
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
